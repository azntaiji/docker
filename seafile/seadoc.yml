services:

  seadoc:
    image: ${SEADOC_IMAGE:-seafileltd/sdoc-server:2.0-latest}
    container_name: seadoc
    restart: unless-stopped
    volumes:
      - ${SEADOC_VOLUME:-/opt/seadoc-data/}:/shared
    ports:
    #   - "80:80"
      - 7070:7070
      - 8888:8888
    environment:
      - DB_HOST=${SEAFILE_MYSQL_DB_HOST:-db}
      - DB_PORT=${SEAFILE_MYSQL_DB_PORT:-3306}
      - DB_USER=${SEAFILE_MYSQL_DB_USER:-seafile}
      - DB_PASSWORD=${SEAFILE_MYSQL_DB_PASSWORD:?Variable is not set or empty}
      - DB_NAME=${SEADOC_MYSQL_DB_NAME:-seahub_db}
      - TIME_ZONE=${TIME_ZONE:-Etc/UTC}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?Variable is not set or empty}
      - NON_ROOT=${NON_ROOT:-false}
      - SEAHUB_SERVICE_URL=${SEAFILE_SERVICE_URL:-http://seafile}
    labels:
# Enable Traefik
      - traefik.enable=true

      # HTTP router (redirect to HTTPS) — covers both paths
      - traefik.http.routers.seadoc.entrypoints=web
      - traefik.http.routers.seadoc.rule=Host(`files.zachtaiji.com`) && (PathPrefix(`/socket.io`) || PathPrefix(`/sdoc-server`))
      - traefik.http.routers.seadoc.middlewares=https_redirect@docker,non_www@docker

      # HTTPS router: /socket.io → seadoc:80/socket.io (path preserved as-is)
      - traefik.http.routers.seadoc-socketio-secure.entrypoints=websecure
      - traefik.http.routers.seadoc-socketio-secure.rule=Host(`files.zachtaiji.com`) && PathPrefix(`/socket.io`)
      - traefik.http.routers.seadoc-socketio-secure.tls=true
      - traefik.http.routers.seadoc-socketio-secure.tls.certresolver=myresolver
      - traefik.http.routers.seadoc-socketio-secure.service=seadoc

      # HTTPS router: /sdoc-server/foo → seadoc:80/foo (prefix stripped)
      - traefik.http.routers.seadoc-server-secure.entrypoints=websecure
      - traefik.http.routers.seadoc-server-secure.rule=Host(`files.zachtaiji.com`) && PathPrefix(`/sdoc-server`)
      - traefik.http.routers.seadoc-server-secure.tls=true
      - traefik.http.routers.seadoc-server-secure.tls.certresolver=myresolver
      - traefik.http.routers.seadoc-server-secure.middlewares=seadoc-stripprefix
      - traefik.http.routers.seadoc-server-secure.service=seadoc

      # Middleware: strip /sdoc-server prefix
      - traefik.http.middlewares.seadoc-stripprefix.stripprefix.prefixes=/sdoc-server

      # Service: target port 80 on the seadoc container
      - traefik.http.services.seadoc.loadbalancer.server.port=80

      # Network (same as seafile)
      - traefik.docker.network=reverse-proxynet
    depends_on:
      seafile-db:
        condition: service_healthy
    networks:
      - seafile-net
      - reverse-proxynet

networks:
  seafile-net:
    name: seafile-net
  reverse-proxynet:
    name: reverse-proxynet
    external: true
